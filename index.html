<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1학년 1반 상담 신청</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; padding: 10px; background-color: #f4f7f6; }
        #calendar { max-width: 850px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #34495e; margin-bottom: 25px; }
        /* 🚫 야자 감독일 스타일 (빗금) */
        .fc-day-disabled { background: repeating-linear-gradient(45deg, #fff5f5, #fff5f5 10px, #ffe0e0 10px, #ffe0e0 20px) !important; cursor: not-allowed !important; opacity: 0.8; }
        /* 이벤트 스타일: 이름만 중앙에 표시 */
        .fc-event { cursor: pointer; border: none !important; border-radius: 5px; padding: 2px 5px; font-weight: bold; text-align: center; font-size: 0.95em; }
        .fc-day-sun a { color: #e74c3c !important; }
        .fc-day-sat a { color: #3498db !important; }
    </style>
</head>
<body>

    <h2>🌿 1학년 1반 상담 신청 사이트</h2>
    <div id='calendar'></div>

    <script>
        // 🔗 선생님의 최신 GAS URL 적용 완료!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz1HeLfd3QixHPfKGHoxETZU11ICWJTN0Pg1SYIE1t8P9Yz0aL8AjfhXW0hSrPi1gBQQA/exec";
        
        // 🚫 야자 감독일 (클릭 차단 목록)
        const disabledDates = ['2026-03-30', '2026-04-12', '2026-04-19', '2026-04-24', '2026-04-26']; 

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },
                
                // 1. 데이터 불러오기
                events: function(info, successCallback, failureCallback) {
                    fetch(GAS_URL).then(res => res.json()).then(data => successCallback(data));
                },
                
                // 2. 상담 신청 로직
                dateClick: function(info) {
                    if (disabledDates.includes(info.dateStr)) {
                        alert("이날은 선생님 야자 감독일이라 상담이 불가능합니다! 😊");
                        return;
                    }

                    // 중복 체크를 위한 현재 날짜 예약 현황 파악
                    var dayEvents = calendar.getEvents().filter(ev => ev.startStr === info.dateStr);
                    var occupiedSlots = dayEvents.map(ev => ev.extendedProps.slot);

                    var msg = info.dateStr + " [상담 시간 선택]\n";
                    msg += "1. 야자 1차시 " + (occupiedSlots.includes("야자 1차시") ? "(마감)" : "") + "\n";
                    msg += "2. 야자 2차시 " + (occupiedSlots.includes("야자 2차시") ? "(마감)" : "") + "\n";
                    msg += "3. 야자 3차시 " + (occupiedSlots.includes("야자 3차시") ? "(마감)" : "") + "\n";
                    msg += "\n신청할 번호(1, 2, 3)를 입력해주세요.";

                    var slotNum = prompt(msg);
                    if (['1', '2', '3'].includes(slotNum)) {
                        var slotText = "야자 " + slotNum + "차시";
                        
                        // 이미 신청된 차시인지 다시 확인
                        if (occupiedSlots.includes(slotText)) {
                            alert("이미 다른 친구가 신청한 시간입니다. 다른 차시를 골라주세요!");
                            return;
                        }

                        var name = prompt(slotText + " 신청자의 이름을 입력해주세요:");
                        if (name && name.trim() !== "") {
                            sendData({ action: "save", date: info.dateStr, slot: slotText, name: name });
                        }
                    }
                },

                // 3. 상담 취소 및 강제 삭제 (비번 1234)
                eventClick: function(info) {
                    var eventDate = info.event.startStr;
                    var eventSlot = info.event.extendedProps.slot;
                    var eventName = info.event.extendedProps.name;

                    if (confirm("[" + eventSlot + "] " + eventName + " 상담을 취소할까요?")) {
                        var check = prompt("본인 확인용 이름을 입력하거나,\n관리자 비밀번호를 입력해주세요:");
                        if (check === eventName || check === "1234") {
                            sendData({ action: "delete", date: eventDate, slot: eventSlot, name: eventName });
                        } else if (check !== null) {
                            alert("권한이 없습니다.");
                        }
                    }
                },

                // 4. 날짜 칸 렌더링 (야자날 빗금 처리)
                dayCellDidMount: function(info) {
                    if (disabledDates.includes(info.dateStr)) {
                        info.el.classList.add('fc-day-disabled');
                    }
                }
            });

            function sendData(payload) {
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => { alert("성공적으로 처리되었습니다!"); location.reload(); });
            }
            calendar.render();
        });
    </script>
</body>
</html>
